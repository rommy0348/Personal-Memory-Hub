kind = "web"
previewPath = "/"
title = "AI Memory Management System"
version = "1.0.0"
id = "artifacts/memory-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22916
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/memory-system run dev"

[services.env]
PORT = "22916"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/memory-system", "run", "build"]
publicDir = "artifacts/memory-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
